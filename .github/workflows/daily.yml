name: LongAI Daily Data

on:
  schedule:
    # A股午盘后：北京时间 11:35 / 迪拜 07:35 / UTC 03:35
    - cron: "35 3 * * 1-5"

    # A股收盘后：北京时间 15:35 / 迪拜 11:35 / UTC 07:35
    - cron: "35 7 * * 1-5"

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r LongAI-Daily-FIX/requirements.txt

      - name: Fetch market data
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          python LongAI-Daily-FIX/fetch_market.py
          python LongAI-Daily-FIX/fetch/fetch_company.py
          python LongAI-Daily-FIX/fetch/fetch_index.py

      - name: Generate LongAI Gateway
        run: |
          python LongAI-Daily-FIX/report/generate_report.py
          python LongAI-Daily-FIX/report/generate_image.py
          python LongAI-Daily-FIX/report/generate_api.py
          python LongAI-Daily-FIX/report/generate_history_index.py
          python LongAI-Daily-FIX/report/generate_light_api.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LongAI-Daily-FIX/data
          git commit -m "Update LongAI Gateway" || echo "No changes to commit"
          git push
