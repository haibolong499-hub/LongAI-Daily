name: LongAI Daily Data

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r LongAI-Daily-FIX/requirements.txt

      - name: Fetch data
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          python LongAI-Daily-FIX/fetch_market.py
          python LongAI-Daily-FIX/fetch/fetch_company.py

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LongAI-Daily-FIX/data || true
          git commit -m "Update daily report data" || echo "No changes to commit"
          git push
